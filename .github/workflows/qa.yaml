name: QA Deploy

on:
  workflow_dispatch:
    inputs:
      reminder:
        description: "🔴 This workflow ONLY deploys the qa branch to the qa environment"
        required: false
        default: "Read before deploying"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate workflow branch
        run: |
          if [[ "${{ github.ref_name }}" != "qa" ]]; then
            echo "ERROR: QA Deploy workflow must be run from the qa branch"
            exit 1
          fi

      - name: Set fixed values
        id: fixed
        run: |
          echo "branch=qa" >> $GITHUB_OUTPUT
          echo "environment=qa" >> $GITHUB_OUTPUT

      - name: Show deployment details
        run: |
          echo "🚀 Deploying branch: qa"
          echo "🌍 Target environment: qa"

      - name: Checkout qa branch
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Deploy application
        run: |
          echo "Deploying qa → qa"

name: Prod Deploy

on:
  workflow_dispatch:
    inputs:
      reminder:
        description: "🔴 This workflow ONLY deploys the prod branch to the prod environment"
        required: false
        default: "Read before deploying"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate workflow branch
        run: |
          if [[ "${{ github.ref_name }}" != "prod" ]]; then
            echo "ERROR: Prod Deploy workflow must be run from the prod branch"
            exit 1
          fi

      - name: Set fixed values
        id: fixed
        run: |
          echo "branch=prod" >> $GITHUB_OUTPUT
          echo "environment=prod" >> $GITHUB_OUTPUT

      - name: Show deployment details
        run: |
          echo "🚀 Deploying branch: prod"
          echo "🌍 Target environment: prod"

      - name: Checkout prod branch
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Deploy application
        run: |
          echo "Deploying prod → prod"

name: dev Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Select deployment environment (leave empty to auto-detect)"
        options:
          - qa
          - dev
          - prod
        default: ""

      branch:
        description: "Branch to deploy (leave empty to use current branch)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch to deploy
        id: branch
        run: |
          if [ -z "${{ github.event.inputs.branch }}" ]; then
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        id: env
        run: |
          # If user selected an environment, use it
          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-detect environment based on branch name
          case "${{ steps.branch.outputs.branch }}" in
            qa|qa/*)
              echo "environment=qa" >> $GITHUB_OUTPUT
              ;;
            dev|develop|dev/*)
              echo "environment=dev" >> $GITHUB_OUTPUT
              ;;
            main|prod|production|prod/*)
              echo "environment=prod" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "environment=qa" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.branch }}

      - name: Show deployment details
        run: |
          echo "Environment: ${{ steps.env.outputs.environment }}"
          echo "Branch: ${{ steps.branch.outputs.branch }}"

      - name: Deploy application
        run: |
          echo "Deploying ${{ steps.branch.outputs.branch }} to ${{ steps.env.outputs.environment }}"

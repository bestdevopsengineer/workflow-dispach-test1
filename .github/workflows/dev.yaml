name: dev deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Select deployment environment"
        options:
          - qa
          - prod
        default: qa

      branch:
        description: "Branch to deploy (leave empty to use current branch)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Determine branch to deploy
        id: vars
        run: |
          if [ -z "${{ github.event.inputs.branch }}" ]; then
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}

      - name: Show deployment details
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Branch: ${{ steps.vars.outputs.branch }}"

      # Add your real deployment steps here
      - name: Deploy application
        run: |
          echo "Deploying ${{ steps.vars.outputs.branch }} to ${{ github.event.inputs.environment }}"

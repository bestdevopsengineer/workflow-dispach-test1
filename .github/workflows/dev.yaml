name: Dev Deploy

on:
  workflow_dispatch:
    inputs:
      reminder:
        description: "🔴 This workflow ONLY deploys the dev branch to the dev environment"
        required: false
        default: "Choose DEV"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate workflow branch
        run: |
          if [[ "${{ github.ref_name }}" != "dev" ]]; then
            echo "ERROR: Dev Deploy workflow must be run from the dev branch"
            exit 1
          fi

      - name: Set fixed values
        id: fixed
        run: |
          echo "branch=dev" >> $GITHUB_OUTPUT
          echo "environment=dev" >> $GITHUB_OUTPUT

      - name: Show deployment details
        run: |
          echo "🚀 Deploying branch: dev"
          echo "🌍 Target environment: dev"

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Deploy application
        run: |
          echo "Deploying dev → dev"
